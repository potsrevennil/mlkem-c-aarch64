name: Bench
on:
  push:
    branches: ["*"]
jobs:
  bench:
    strategy:
      fail-fast: true
      matrix:
        system: [ macos-latest, linux-latest ]
    runs-on: ${{ matrix.system }}
    steps:
      - name: mac
        if: ${{ matrix.system }} == 'macos-latest'
        run: |
          echo "$(${{ matrix.system }} == 'macos-latest')"
          echo "This is mac on ${{ matrix.system }}"

      - name: linux
        if: ${{ matrix.system }} == 'linux-latest'
        run: |
          echo "$(${{ matrix.system }} == 'linux-latest')"
          echo "This is linux on ${{ matrix.system }}"
